<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Left Section (Text & Button) -->
        <div class="text-section">
            <h1 id="title">Track Your Budget</h1>
            <p id="description">
                Stay in control of your finances by monitoring your income and expenses efficiently.
            </p>

            <!-- Info Section (Click Here Button) -->
            <div class="info-section">
                <p>Do you want to know about this?</p>
                <button onclick="navigateToTips()">Click Here</button>
            </div>
        </div>

        <!-- Right Section (Full-Width Image Slideshow) -->
        <div class="image-section">
            <img id="slideshow" src="image1.jpg" alt="Budget Tracker Image">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
